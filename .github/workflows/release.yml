name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            name: macos-arm64
          - os: ubuntu-latest
            name: linux-x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6
        if: runner.os == 'Linux'
        with:
          swift-version: "6.0"
      - name: Build archive
        run: bash Scripts/build-release.sh
      - name: Archive smoke
        run: bash Scripts/archive-smoke-test.sh "$(ls dist/*.tar.gz)"
      - name: Verify checksums
        run: |
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c dist/*.sha256
          else
            sha256sum -c dist/*.sha256
          fi
      - name: Build app archive
        if: runner.os == 'macOS'
        run: |
          bash Scripts/package-app.sh
          . version.env
          APP_ARCHIVE="dist/UpdateBar-${UPDATEBAR_VERSION}-macos-arm64.app.tar.gz"
          COPYFILE_DISABLE=1 tar -C dist -czf "$APP_ARCHIVE" UpdateBar.app
          shasum -a 256 "$APP_ARCHIVE" >"${APP_ARCHIVE}.sha256"
          shasum -a 256 -c "${APP_ARCHIVE}.sha256"
      - name: Upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: updatebar-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true
      - name: Verify downloaded checksums
        run: |
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 -c dist/*.sha256
          else
            sha256sum -c dist/*.sha256
          fi
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
