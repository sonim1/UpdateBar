name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            name: macos-arm64
          - os: ubuntu-latest
            name: linux-x86_64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify tag matches version
        run: |
          source version.env
          if [[ "$GITHUB_EVENT_NAME" != "push" ]]; then
            echo "release dry run for v${UPDATEBAR_VERSION}"
            exit 0
          fi
          expected="v${UPDATEBAR_VERSION}"
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "release tag must match version.env: expected $expected, got $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6
        if: runner.os == 'Linux'
        with:
          swift-version: "6.0"
      - name: Install Linux link dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev
      - name: Swift tests
        run: swift test
      - name: Build archive
        run: bash Scripts/build-release.sh
      - name: Archive smoke
        run: bash Scripts/archive-smoke-test.sh "$(ls dist/*.tar.gz)"
      - name: Verify checksums
        run: |
          (
            cd dist
            checksum_files=( ./*.sha256 )
            if [[ ! -e "${checksum_files[0]}" ]]; then
              echo "no release checksums found" >&2
              exit 1
            fi
            for checksum_file in "${checksum_files[@]}"; do
              if [[ ! -f "$checksum_file" || ! -s "$checksum_file" || -L "$checksum_file" ]]; then
                echo "unsafe release checksum: $checksum_file" >&2
                exit 1
              fi
            done
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 -c "${checksum_files[@]}"
            else
              sha256sum -c "${checksum_files[@]}"
            fi
          )
      - name: Prepare code signing
        if: runner.os == 'macOS'
        env:
          MACOS_SIGNING_CERT_P12: ${{ secrets.MACOS_SIGNING_CERT_P12 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          if [[ "$(/usr/bin/uname -m)" != "arm64" ]]; then
            echo "canonical UpdateBar app releases require an arm64 macOS runner" >&2
            exit 1
          fi
          if [[ -z "$MACOS_SIGNING_CERT_P12" || -z "$MACOS_SIGNING_CERT_PASSWORD" ]]; then
            echo "macOS signing secrets are required for app release" >&2
            exit 1
          fi
          if [[ -z "$NOTARY_APPLE_ID" || -z "$NOTARY_TEAM_ID" || -z "$NOTARY_PASSWORD" ]]; then
            echo "Apple notary secrets are required for app release" >&2
            exit 1
          fi
          if [[ ! "$SPARKLE_PUBLIC_ED_KEY" =~ ^[A-Za-z0-9+/]{43}=$ ]]; then
            echo "SPARKLE_PUBLIC_ED_KEY GitHub variable must be a canonical 32-byte Base64 public key" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/updatebar-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "$MACOS_SIGNING_CERT_P12" | base64 --decode >"$RUNNER_TEMP/signing-cert.p12"
          security import "$RUNNER_TEMP/signing-cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/signing-cert.p12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$IDENTITY" ]]; then
            echo "no Developer ID Application identity found in imported certificate" >&2
            exit 1
          fi
          {
            echo "DEVELOPER_ID_APPLICATION=$IDENTITY"
            echo "SPARKLE_PUBLIC_ED_KEY=$SPARKLE_PUBLIC_ED_KEY"
          } >>"$GITHUB_ENV"

          xcrun notarytool store-credentials updatebar-notary \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --keychain "$KEYCHAIN_PATH" >/dev/null
          {
            echo "NOTARYTOOL_KEYCHAIN_PROFILE=updatebar-notary"
            echo "NOTARYTOOL_KEYCHAIN=$KEYCHAIN_PATH"
          } >>"$GITHUB_ENV"
      - name: Build notarized app DMG
        if: runner.os == 'macOS'
        run: |
          APP_DMG="$(bash Scripts/build-app-dmg.sh)"
          bash Scripts/app-dmg-smoke-test.sh "$APP_DMG"
      - name: Verify release metadata
        if: runner.os == 'macOS'
        # The in-repo v0.5.0 cask remains pinned to its already-published
        # legacy app archive. The canonical DMG is verified by its smoke test;
        # the tap automation consumes its release manifest after publication.
        run: |
          UPDATEBAR_VERIFY_STATIC_ONLY=1 \
          Scripts/verify-homebrew-metadata.sh dist
      - name: Upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: updatebar-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.dmg
            dist/*.sha256

  publish:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true
      - name: Extract release notes
        run: bash Scripts/extract-changelog-section.sh "$GITHUB_REF_NAME" > release-notes.md
      - name: Verify downloaded checksums
        run: |
          (
            cd dist
            checksum_files=( ./*.sha256 )
            if [[ ! -e "${checksum_files[0]}" ]]; then
              echo "no downloaded release checksums found" >&2
              exit 1
            fi
            for checksum_file in "${checksum_files[@]}"; do
              if [[ ! -f "$checksum_file" || ! -s "$checksum_file" || -L "$checksum_file" ]]; then
                echo "unsafe downloaded release checksum: $checksum_file" >&2
                exit 1
              fi
            done
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 -c "${checksum_files[@]}"
            else
              sha256sum -c "${checksum_files[@]}"
            fi
          )
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            dist/*.tar.gz
            dist/*.dmg
            dist/*.sha256
          body_path: release-notes.md
          fail_on_unmatched_files: true
