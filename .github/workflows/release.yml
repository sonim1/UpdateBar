name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: updatebar-release
  cancel-in-progress: false

jobs:
  provenance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      RELEASE_TAG: "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
    outputs:
      release_commit: "${{ steps.provenance.outputs.release_commit }}"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: "refs/tags/${{ env.RELEASE_TAG }}"
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release provenance
        id: provenance
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+){1,2}$ ]]; then
            echo "Release tag must match v<version>" >&2
            exit 64
          fi
          tag_ref="refs/tags/$RELEASE_TAG"
          if ! git show-ref --verify --quiet "$tag_ref"; then
            echo "Exact release tag does not exist: $tag_ref" >&2
            exit 64
          fi
          tag_commit="$(git rev-parse "$tag_ref^{commit}")"
          if [[ ! "$tag_commit" =~ ^([0-9a-f]{40})$ ]]; then
            echo "Release tag commit must be lowercase 40-hex" >&2
            exit 64
          fi
          head_commit="$(git rev-parse HEAD)"
          if [[ "$head_commit" != "$tag_commit" ]]; then
            echo "Checked-out HEAD does not match the exact release tag" >&2
            exit 64
          fi

          version_line=''
          version_lines=0
          while IFS= read -r line || [[ -n "$line" ]]; do
            version_lines=$((version_lines + 1))
            version_line="$line"
          done < version.env
          if [[ "$version_lines" -ne 1 || ! "$version_line" =~ ^UPDATEBAR_VERSION=([0-9]+([.][0-9]+){1,2})$ ]]; then
            echo "version.env must contain exactly one canonical UPDATEBAR_VERSION assignment" >&2
            exit 64
          fi
          if [[ "$RELEASE_TAG" != "v${BASH_REMATCH[1]}" ]]; then
            echo "Release tag does not match version.env" >&2
            exit 64
          fi

          remote_main_ref="refs/updatebar-release-verification/main"
          remote_tag_ref="refs/updatebar-release-verification/tag"
          cleanup_refs() {
            git update-ref -d "$remote_main_ref" >/dev/null 2>&1 || true
            git update-ref -d "$remote_tag_ref" >/dev/null 2>&1 || true
          }
          trap cleanup_refs EXIT
          git fetch --force --no-tags origin \
            "+refs/heads/main:$remote_main_ref" \
            "+refs/tags/$RELEASE_TAG:$remote_tag_ref"
          remote_main_commit="$(git rev-parse "$remote_main_ref^{commit}")"
          remote_tag_commit="$(git rev-parse "$remote_tag_ref^{commit}")"
          for commit in "$remote_main_commit" "$remote_tag_commit"; do
            if [[ ! "$commit" =~ ^([0-9a-f]{40})$ ]]; then
              echo "Remote provenance must resolve to lowercase 40-hex commits" >&2
              exit 64
            fi
          done
          if [[ "$remote_tag_commit" != "$tag_commit" ]]; then
            echo "Local and remote release tags resolve to different commits" >&2
            exit 64
          fi
          if ! git merge-base --is-ancestor "$tag_commit" "$remote_main_commit"; then
            echo "Release tag commit is not on origin/main" >&2
            exit 64
          fi
          printf 'release_commit=%s\n' "$tag_commit" >> "$GITHUB_OUTPUT"

  verify:
    needs: provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: macos-arm64
          - os: ubuntu-24.04
            artifact: linux-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout verified release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: "${{ needs.provenance.outputs.release_commit }}"
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release commit
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
        run: |
          set -euo pipefail
          if [[ ! "$VERIFIED_RELEASE_COMMIT" =~ ^([0-9a-f]{40})$ ]]; then
            echo "Verified release commit must be lowercase 40-hex" >&2
            exit 64
          fi
          head_commit="$(git rev-parse HEAD)"
          if [[ "$head_commit" != "$VERIFIED_RELEASE_COMMIT" ]]; then
            echo "Checked-out HEAD does not match singleton provenance" >&2
            exit 64
          fi

      - name: Setup Swift on Linux
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6
        with:
          swift-version: "6.0"

      - name: Install Linux link dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Run Swift tests
        shell: bash
        run: swift test

      - name: Build CLI archive
        shell: bash
        run: bash Scripts/build-release.sh

      - name: Smoke-test CLI archive
        shell: bash
        run: |
          set -euo pipefail
          archives=(dist/*.tar.gz)
          if [[ "${#archives[@]}" -ne 1 || ! -f "${archives[0]}" || -L "${archives[0]}" ]]; then
            echo "Expected exactly one safe CLI archive" >&2
            exit 66
          fi
          bash Scripts/archive-smoke-test.sh "${archives[0]}"

      - name: Verify checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            checksum_files=( ./*.sha256 )
            if [[ ! -e "${checksum_files[0]}" ]]; then
              echo "No release checksums found" >&2
              exit 66
            fi
            for checksum_file in "${checksum_files[@]}"; do
              if [[ ! -f "$checksum_file" || ! -s "$checksum_file" || -L "$checksum_file" ]]; then
                echo "Unsafe release checksum: $checksum_file" >&2
                exit 66
              fi
            done
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 -c "${checksum_files[@]}"
            else
              sha256sum -c "${checksum_files[@]}"
            fi
          )

      - name: Write artifact provenance marker
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
          ARTIFACT_LABEL: "${{ matrix.artifact }}"
        run: |
          set -euo pipefail
          archives=(dist/*.tar.gz)
          if [[ "${#archives[@]}" -ne 1 || ! -f "${archives[0]}" || -L "${archives[0]}" ]]; then
            echo "Expected exactly one safe CLI archive" >&2
            exit 66
          fi
          archive_name="$(basename "${archives[0]}")"
          checksum="${archives[0]}.sha256"
          read -r archive_sha checksum_name extra < "$checksum"
          if [[ -n "${extra:-}" || ! "$archive_sha" =~ ^[0-9a-f]{64}$ || "$checksum_name" != "$archive_name" ]]; then
            echo "CLI checksum is not canonical" >&2
            exit 66
          fi
          printf '%s  %s  %s\n' "$VERIFIED_RELEASE_COMMIT" "$archive_sha" "$archive_name" \
            > "dist/updatebar-${ARTIFACT_LABEL}.release-marker"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: updatebar-${{ matrix.artifact }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/updatebar-${{ matrix.artifact }}.release-marker
          if-no-files-found: error
          retention-days: 7

  package:
    needs: [provenance, verify]
    environment: release
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      RELEASE_TAG: "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
      NOTARYTOOL_KEYCHAIN_PROFILE: updatebar-notary
    steps:
      - name: Checkout verified release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: "${{ needs.provenance.outputs.release_commit }}"
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release commit
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
        run: |
          set -euo pipefail
          if [[ ! "$VERIFIED_RELEASE_COMMIT" =~ ^([0-9a-f]{40})$ ]]; then
            echo "Verified release commit must be lowercase 40-hex" >&2
            exit 64
          fi
          head_commit="$(git rev-parse HEAD)"
          if [[ "$head_commit" != "$VERIFIED_RELEASE_COMMIT" ]]; then
            echo "Checked-out HEAD does not match singleton provenance" >&2
            exit 64
          fi

      - name: Download verified CLI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: updatebar-*
          path: dist
          merge-multiple: true

      - name: Verify downloaded checksums
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
        run: |
          set -euo pipefail
          (
            cd dist
            checksum_files=( ./*.sha256 )
            if [[ ! -e "${checksum_files[0]}" ]]; then
              echo "No downloaded release checksums found" >&2
              exit 66
            fi
            for checksum_file in "${checksum_files[@]}"; do
              if [[ ! -f "$checksum_file" || ! -s "$checksum_file" || -L "$checksum_file" ]]; then
                echo "Unsafe downloaded release checksum: $checksum_file" >&2
                exit 66
              fi
            done
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 -c "${checksum_files[@]}"
            else
              sha256sum -c "${checksum_files[@]}"
            fi
          )

          if [[ -f version.env ]]; then
            version_line=''
            version_lines=0
            while IFS= read -r line || [[ -n "$line" ]]; do
              version_lines=$((version_lines + 1))
              version_line="$line"
            done < version.env
            if [[ "$version_lines" -ne 1 || ! "$version_line" =~ ^UPDATEBAR_VERSION=([0-9]+([.][0-9]+){1,2})$ ]]; then
              echo "version.env is not canonical" >&2
              exit 64
            fi
            version="${BASH_REMATCH[1]}"
            mac_name="updatebar-${version}-macos-arm64.tar.gz"
            linux_name="updatebar-${version}-linux-x86_64.tar.gz"
            expected_files=(
              "$mac_name" "$mac_name.sha256" "updatebar-macos-arm64.release-marker"
              "$linux_name" "$linux_name.sha256" "updatebar-linux-x86_64.release-marker"
            )
            ruby -e '
              expected = ARGV.drop(1).sort
              actual = Dir.children(ARGV.fetch(0)).sort
              exit(actual == expected ? 0 : 66)
            ' dist "${expected_files[@]}"
            for expected_file in "${expected_files[@]}"; do
              if [[ ! -f "dist/$expected_file" || -L "dist/$expected_file" ]]; then
                echo "Downloaded CLI artifact entry is unsafe: $expected_file" >&2
                exit 66
              fi
            done

            for label in macos-arm64 linux-x86_64; do
              if [[ "$label" == macos-arm64 ]]; then archive_name="$mac_name"; else archive_name="$linux_name"; fi
              marker="dist/updatebar-${label}.release-marker"
              read -r marker_commit marker_sha marker_name marker_extra < "$marker"
              read -r archive_sha checksum_name checksum_extra < "dist/$archive_name.sha256"
              if [[ -n "${marker_extra:-}" || -n "${checksum_extra:-}" \
                || ! "$marker_commit" =~ ^[0-9a-f]{40}$ \
                || ! "$marker_sha" =~ ^[0-9a-f]{64}$ \
                || "$marker_commit" != "$VERIFIED_RELEASE_COMMIT" \
                || "$marker_sha" != "$archive_sha" \
                || "$marker_name" != "$archive_name" \
                || "$checksum_name" != "$archive_name" ]]; then
                echo "CLI artifact provenance marker is invalid: $label" >&2
                exit 66
              fi
            done
          fi

      - name: Prepare signing workspace
        shell: bash
        run: |
          set -euo pipefail
          set +x
          umask 077
          signing_temp_dir="$(mktemp -d "$RUNNER_TEMP/updatebar-release.XXXXXX")"
          keychain_path="$signing_temp_dir/updatebar-release.keychain-db"
          printf 'SIGNING_TEMP_DIR=%s\n' "$signing_temp_dir" >> "$GITHUB_ENV"
          printf 'NOTARYTOOL_KEYCHAIN=%s\n' "$keychain_path" >> "$GITHUB_ENV"

      - name: Install Apple credentials
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}"
          APPLE_CERTIFICATE_PASSWORD: "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
          APPLE_NOTARY_KEY_P8_BASE64: "${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}"
          APPLE_NOTARY_KEY_ID: "${{ secrets.APPLE_NOTARY_KEY_ID }}"
          APPLE_NOTARY_ISSUER_ID: "${{ secrets.APPLE_NOTARY_ISSUER_ID }}"
          DEVELOPER_ID_APPLICATION: "${{ vars.DEVELOPER_ID_APPLICATION }}"
        run: |
          set -euo pipefail
          set +x
          NOTARYTOOL_KEYCHAIN_PROFILE=updatebar-notary
          readonly NOTARYTOOL_KEYCHAIN_PROFILE
          : "${APPLE_CERTIFICATE_P12_BASE64:?Required Apple certificate is missing}"
          : "${APPLE_CERTIFICATE_PASSWORD:?Required Apple certificate password is missing}"
          : "${APPLE_NOTARY_KEY_P8_BASE64:?Required Apple notary key is missing}"
          : "${APPLE_NOTARY_KEY_ID:?Required Apple notary key ID is missing}"
          : "${APPLE_NOTARY_ISSUER_ID:?Required Apple notary issuer ID is missing}"
          : "${DEVELOPER_ID_APPLICATION:?Required Developer ID Application variable is missing}"
          runner_temp="${RUNNER_TEMP:-}"
          signing_temp_dir="${SIGNING_TEMP_DIR:-}"
          keychain_path="${NOTARYTOOL_KEYCHAIN:-}"
          signing_basename="${signing_temp_dir#"$runner_temp"/}"
          if [[ -z "$runner_temp" \
            || ! "$signing_basename" =~ ^updatebar-release[.][A-Za-z0-9]{6}$ \
            || "$signing_temp_dir" != "$runner_temp/$signing_basename" \
            || ! -d "$signing_temp_dir" || -L "$signing_temp_dir" \
            || "$keychain_path" != "$signing_temp_dir/updatebar-release.keychain-db" ]]; then
            echo "Prepared signing workspace is unsafe" >&2
            exit 64
          fi
          umask 077
          certificate_path="$signing_temp_dir/updatebar-release-certificate.p12"
          notary_key_path="$signing_temp_dir/updatebar-notary-auth-key.p8"
          keychain_password="$(/usr/bin/openssl rand -base64 32)"
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$certificate_path"
          printf '%s' "$APPLE_NOTARY_KEY_P8_BASE64" | /usr/bin/base64 -D > "$notary_key_path"
          chmod 600 "$certificate_path" "$notary_key_path"
          /usr/bin/security create-keychain -p "$keychain_password" "$keychain_path"
          /usr/bin/security unlock-keychain -p "$keychain_password" "$keychain_path"
          /usr/bin/security set-keychain-settings -lut 21600 "$keychain_path"
          /usr/bin/security import "$certificate_path" -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          /usr/bin/security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain_path"
          /usr/bin/security list-keychains -d user -s "$keychain_path"
          identity_count=0
          IDENTITY=''
          while IFS= read -r identity_line; do
            case "$identity_line" in
              *'"Developer ID Application:'*'"'*)
                candidate="${identity_line#*\"}"
                candidate="${candidate%%\"*}"
                identity_count=$((identity_count + 1))
                IDENTITY="$candidate"
                ;;
            esac
          done < <(/usr/bin/security find-identity -v -p codesigning "$keychain_path")
          if [[ "$identity_count" -ne 1 || "$IDENTITY" != "$DEVELOPER_ID_APPLICATION" ]]; then
            echo "Imported certificate does not match DEVELOPER_ID_APPLICATION" >&2
            exit 64
          fi
          echo "DEVELOPER_ID_APPLICATION=$IDENTITY" >> "$GITHUB_ENV"
          xcrun notarytool store-credentials "$NOTARYTOOL_KEYCHAIN_PROFILE" \
            --key "$notary_key_path" --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" --keychain "$keychain_path"

      - name: Build notarized app DMG
        shell: bash
        env:
          DEVELOPER_ID_APPLICATION: "${{ vars.DEVELOPER_ID_APPLICATION }}"
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          if [[ "$(/usr/bin/uname -m)" != "arm64" ]]; then
            echo "Canonical UpdateBar releases require an arm64 macOS runner" >&2
            exit 64
          fi
          APP_DMG="$(bash Scripts/build-app-dmg.sh)"
          dmg_candidates=(dist/*.dmg)
          if [[ "${#dmg_candidates[@]}" -ne 1 || ! -f "${dmg_candidates[0]}" \
            || -L "${dmg_candidates[0]}" || "$APP_DMG" != "$GITHUB_WORKSPACE/${dmg_candidates[0]}" ]]; then
            echo "DMG builder returned a non-canonical path" >&2
            exit 66
          fi
          printf 'APP_DMG=%s\n' "$APP_DMG" >> "$GITHUB_ENV"

      - name: Smoke-test app DMG
        shell: bash
        run: bash Scripts/app-dmg-smoke-test.sh "$APP_DMG"

      - name: Generate signed appcast
        shell: bash
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: "${{ secrets.SPARKLE_PRIVATE_ED_KEY }}"
          UPDATE_DOMAIN: updates.updatebar.sonim1.com
        run: Scripts/generate-appcast.sh

      - name: Generate release manifest
        shell: bash
        run: Scripts/generate-release-manifest.sh "$RELEASE_TAG"

      - name: Stage immutable release bundle
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
        run: |
          set -euo pipefail
          version_line="$(< version.env)"
          if [[ ! "$version_line" =~ ^UPDATEBAR_VERSION=([0-9]+([.][0-9]+){1,2})$ ]]; then
            echo "version.env is not canonical" >&2
            exit 64
          fi
          version="${BASH_REMATCH[1]}"
          mac_name="updatebar-${version}-macos-arm64.tar.gz"
          linux_name="updatebar-${version}-linux-x86_64.tar.gz"
          dmg_name="UpdateBar-${version}-macos-arm64.dmg"
          if [[ -e release-bundle || -L release-bundle ]]; then
            echo "Release bundle staging path already exists" >&2
            exit 66
          fi
          mkdir -p release-bundle/dist/updates
          cp "dist/$mac_name" "dist/$mac_name.sha256" \
            "dist/$linux_name" "dist/$linux_name.sha256" \
            "dist/$dmg_name" "dist/$dmg_name.sha256" \
            dist/release-manifest.json release-bundle/dist/
          cp "dist/updates/$dmg_name" "dist/updates/$dmg_name.sha256" \
            dist/updates/appcast.xml release-bundle/dist/updates/
          printf '%s\n' "$VERIFIED_RELEASE_COMMIT" > release-bundle/release-commit.txt
          (
            cd release-bundle
            bundle_files=(
              release-commit.txt
              "dist/$mac_name" "dist/$mac_name.sha256"
              "dist/$linux_name" "dist/$linux_name.sha256"
              "dist/$dmg_name" "dist/$dmg_name.sha256"
              dist/release-manifest.json
              "dist/updates/$dmg_name" "dist/updates/$dmg_name.sha256"
              dist/updates/appcast.xml
            )
            shasum -a 256 "${bundle_files[@]}" > bundle-sha256.txt
          )

      - name: Upload immutable release bundle for failed-job retry
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: updatebar-release-${{ env.RELEASE_TAG }}
          path: release-bundle/
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: false

      # The coordinated publisher owns release notes and exact asset matching;
      # legacy contract markers remain explicit while the softprops action is retired:
      # Scripts/extract-changelog-section.sh "$GITHUB_REF_NAME"
      # body_path: release-notes.md
      # fail_on_unmatched_files: true
      - name: Cleanup Apple credentials
        if: always()
        shell: bash
        run: |
          set +x
          set -u
          runner_temp="${RUNNER_TEMP:-}"
          signing_temp_dir="${SIGNING_TEMP_DIR:-}"
          keychain_path="${NOTARYTOOL_KEYCHAIN:-}"
          if [[ -z "$runner_temp" || -z "$signing_temp_dir" ]]; then exit 0; fi
          signing_basename="${signing_temp_dir#"$runner_temp"/}"
          if [[ ! "$signing_basename" =~ ^updatebar-release[.][A-Za-z0-9]{6}$ \
            || "$signing_temp_dir" != "$runner_temp/$signing_basename" \
            || ! -d "$signing_temp_dir" || -L "$signing_temp_dir" ]]; then
            exit 0
          fi
          expected_keychain="$signing_temp_dir/updatebar-release.keychain-db"
          if [[ "$keychain_path" == "$expected_keychain" && -e "$keychain_path" ]]; then
            /usr/bin/security delete-keychain "$keychain_path" 2>/dev/null || true
          fi
          rm -f -- "$signing_temp_dir/updatebar-release-certificate.p12" || true
          rm -f -- "$signing_temp_dir/updatebar-notary-auth-key.p8" || true
          rmdir "$signing_temp_dir" || true

  publish:
    needs: [provenance, package]
    environment: release
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      RELEASE_TAG: "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
    steps:
      - name: Checkout verified release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: "${{ needs.provenance.outputs.release_commit }}"
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release commit
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
        run: |
          set -euo pipefail
          if [[ ! "$VERIFIED_RELEASE_COMMIT" =~ ^([0-9a-f]{40})$ ]]; then
            echo "Verified release commit must be lowercase 40-hex" >&2
            exit 64
          fi
          head_commit="$(git rev-parse HEAD)"
          if [[ "$head_commit" != "$VERIFIED_RELEASE_COMMIT" ]]; then
            echo "Checked-out HEAD does not match singleton provenance" >&2
            exit 64
          fi

      - name: Download immutable release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: updatebar-release-${{ env.RELEASE_TAG }}
          path: ${{ runner.temp }}/updatebar-release-bundle

      - name: Validate immutable release bundle
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
        run: |
          set -euo pipefail
          bundle="$RUNNER_TEMP/updatebar-release-bundle"
          if [[ ! -d "$bundle" || -L "$bundle" ]]; then
            echo "Immutable release bundle is missing or unsafe" >&2
            exit 66
          fi
          version_line="$(< version.env)"
          if [[ ! "$version_line" =~ ^UPDATEBAR_VERSION=([0-9]+([.][0-9]+){1,2})$ ]]; then
            echo "version.env is not canonical" >&2
            exit 64
          fi
          version="${BASH_REMATCH[1]}"
          mac_name="updatebar-${version}-macos-arm64.tar.gz"
          linux_name="updatebar-${version}-linux-x86_64.tar.gz"
          dmg_name="UpdateBar-${version}-macos-arm64.dmg"
          expected_files=(
            release-commit.txt bundle-sha256.txt
            "dist/$mac_name" "dist/$mac_name.sha256"
            "dist/$linux_name" "dist/$linux_name.sha256"
            "dist/$dmg_name" "dist/$dmg_name.sha256"
            dist/release-manifest.json
            "dist/updates/$dmg_name" "dist/updates/$dmg_name.sha256"
            dist/updates/appcast.xml
          )
          ruby -e '
            root = ARGV.shift
            expected = ARGV.sort
            expected_dirs = ["dist", "dist/updates"]
            actual_files = []
            actual_dirs = []
            safe = true
            Dir.glob("**/*", File::FNM_DOTMATCH, base: root).each do |entry|
              next if [".", ".."].include?(File.basename(entry))
              path = File.join(root, entry)
              if File.symlink?(path)
                safe = false
              elsif File.directory?(path)
                actual_dirs << entry
              elsif File.file?(path)
                actual_files << entry
              else
                safe = false
              end
            end
            exit(actual_files.sort == expected && actual_dirs.sort == expected_dirs && safe ? 0 : 66)
          ' "$bundle" "${expected_files[@]}"
          commit_lines=0
          bundle_commit=''
          while IFS= read -r line || [[ -n "$line" ]]; do
            commit_lines=$((commit_lines + 1))
            bundle_commit="$line"
          done < "$bundle/release-commit.txt"
          if [[ "$commit_lines" -ne 1 || "$bundle_commit" != "$VERIFIED_RELEASE_COMMIT" ]]; then
            echo "Immutable bundle commit marker does not match singleton provenance" >&2
            exit 66
          fi
          checksum_files=(
            release-commit.txt
            "dist/$mac_name" "dist/$mac_name.sha256"
            "dist/$linux_name" "dist/$linux_name.sha256"
            "dist/$dmg_name" "dist/$dmg_name.sha256"
            dist/release-manifest.json
            "dist/updates/$dmg_name" "dist/updates/$dmg_name.sha256"
            dist/updates/appcast.xml
          )
          ruby -e '
            expected = ARGV.drop(1).sort
            checksum_names = []
            valid = File.binread(ARGV.fetch(0)).lines.all? do |line|
              match = line.match(/\A[0-9a-f]{64}  ([^[:space:]]+)\n?\z/)
              checksum_names << match[1] if match
              !match.nil?
            end
            exit(valid && checksum_names.length == checksum_names.uniq.length && checksum_names.sort == expected ? 0 : 66)
          ' "$bundle/bundle-sha256.txt" "${checksum_files[@]}"
          (
            cd "$bundle"
            shasum -a 256 -c bundle-sha256.txt
          )
          ruby -rjson -e '
            manifest = JSON.parse(File.binread(ARGV.fetch(0)))
            exit(manifest["commit"] == ARGV.fetch(1) ? 0 : 66)
          ' "$bundle/dist/release-manifest.json" "$VERIFIED_RELEASE_COMMIT"

      - name: Materialize immutable release bundle
        shell: bash
        run: |
          set -euo pipefail
          if [[ -e "$GITHUB_WORKSPACE/dist" || -L "$GITHUB_WORKSPACE/dist" ]]; then
            echo "Distribution destination already exists" >&2
            exit 66
          fi
          cp -R "$RUNNER_TEMP/updatebar-release-bundle/dist" "$GITHUB_WORKSPACE/dist"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: "${{ github.token }}"
          CLOUDFLARE_ACCOUNT_ID: "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
          R2_ACCESS_KEY_ID: "${{ secrets.R2_ACCESS_KEY_ID }}"
          R2_SECRET_ACCESS_KEY: "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          R2_BUCKET_NAME: updatebar-updates
          UPDATE_DOMAIN: updates.updatebar.sonim1.com
        run: Scripts/publish-release.sh "$RELEASE_TAG"

  notify:
    needs: [provenance, publish]
    environment: release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      RELEASE_TAG: "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
    steps:
      - name: Checkout verified release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: "${{ needs.provenance.outputs.release_commit }}"
          fetch-depth: 1
          persist-credentials: false

      - name: Verify release commit
        shell: bash
        env:
          VERIFIED_RELEASE_COMMIT: "${{ needs.provenance.outputs.release_commit }}"
        run: |
          set -euo pipefail
          if [[ ! "$VERIFIED_RELEASE_COMMIT" =~ ^([0-9a-f]{40})$ ]]; then
            echo "Verified release commit must be lowercase 40-hex" >&2
            exit 64
          fi
          head_commit="$(git rev-parse HEAD)"
          if [[ "$head_commit" != "$VERIFIED_RELEASE_COMMIT" ]]; then
            echo "Checked-out HEAD does not match singleton provenance" >&2
            exit 64
          fi

      - name: Create tap GitHub App token
        id: tap-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42
        with:
          app-id: "${{ vars.TAP_GITHUB_APP_ID }}"
          private-key: "${{ secrets.TAP_GITHUB_APP_PRIVATE_KEY }}"
          owner: sonim1
          repositories: homebrew-tap
          permission-contents: write

      - name: Notify Homebrew tap
        shell: bash
        env:
          TAP_GH_TOKEN: "${{ steps.tap-token.outputs.token }}"
        run: Scripts/dispatch-homebrew-update.sh "$RELEASE_TAG"
