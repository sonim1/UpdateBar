name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tui/package-lock.json
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .build
          key: macos-spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: macos-spm-${{ runner.os }}-
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Quality gate
        run: SKIP_SIGNED_APPCAST=1 bash Scripts/quality-gate.sh

  linux:
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .build
          key: linux-spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: linux-spm-${{ runner.os }}-
      - name: Install quality gate dependencies
        run: |
          apt-get update
          apt-get install -y nodejs ruby shellcheck
      - name: Trust the checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Quality gate
        run: SKIP_MENUBAR_SMOKE=1 SKIP_TUI_SMOKE=1 SKIP_TUI_INPUT=1 SKIP_SIGNED_APPCAST=1 bash Scripts/quality-gate.sh
